<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="description" content="Projeto Contador de Pizza - Matteo">
    <meta name="author" content="Matteo Kmeliuskas">
    <meta name="keywords" content="contador pizza, pizza, contador, pedaços, aplicativo pizza, aplicativo online, responsivo, css, sass, html, front-end, web">

    <title>Contador de Pizza</title>

    <!-- CSS Customizado -->
    <link rel="stylesheet" href="css/estilo.css">

    <!-- JQuery 3.7.1 -->
    <script src="js/jQuery-3.7.1.js"></script>

    <!-- Link do Fontawesome -->
    <script src="https://kit.fontawesome.com/b3a029b029.js"></script>

    <!-- FavIcon da aplicação -->
    <link rel="shortcut icon" href="img/fatia-pizza.png" type="image/x-icon">
</head>
<body>

    <header id="header">
        <h1 id="tituloPagina">Contador de Pizza, ganhe de seus amigos!</h1>
        <img src="img/fatia-pizza.png" alt="Imagem de uma fatia de pizza">
    </header>

    <main id="main">
        <div id="container">
            <div id="inputs">
                <label for="input-nome">Nome do participante</label>
                <div class="input-group">
                    <input type="text" id="input-nome" placeholder="Digite o nome">
                    <button type="button" id="adicionarParticipante" onclick="adicionarParticipante()">
                        <i class="fas fa-user-plus"></i> Adicionar
                    </button>
                </div>
            </div>

            <div id="participantes-section">
                <h2>Participantes</h2>
                <div id="lista-participantes">
                    <p class="sem-participantes">Nenhum participante ainda. Adicione alguém!</p>
                </div>
            </div>
        </div>
    </main>

    <footer id="rodape">
        <h2>© Todos os direitos reservados para o desenvolvedor <span>Matteo Kmeliuskas</span></h2>
    </footer>

    <script>
        // Array para armazenar os participantes
        let participantes = [];
        let participantesIdCounter = 0;

        // Função para adicionar um novo participante
        function adicionarParticipante() {
            const nomeInput = document.getElementById('input-nome');
            const nome = nomeInput.value.trim();

            if (nome === '') {
                alert('Por favor, insira um nome!');
                return;
            }

            // Criar novo participante
            const novoParticipante = {
                id: ++participantesIdCounter,
                nome: nome,
                fatias: 1
            };

            participantes.push(novoParticipante);
            nomeInput.value = '';
            atualizarListaParticipantes();
        }

        // Função para remover um participante
        function removerParticipante(id) {
            participantes = participantes.filter(p => p.id !== id);
            atualizarListaParticipantes();
        }

        // Função para adicionar fatia a um participante específico
        function adicionarFatia(id) {
            const participante = participantes.find(p => p.id === id);
            if (participante) {
                participante.fatias++;
                atualizarListaParticipantes();
            }
        }

        // Função para remover fatia de um participante específico
        function removerFatia(id) {
            const participante = participantes.find(p => p.id === id);
            if (participante) {
                participante.fatias--;
                if (participante.fatias < 1) {
                    participante.fatias = 1;
                }
                atualizarListaParticipantes();
            }
        }

        // Função para gerar as pizzas visuais
        function gerarPizzas(fatias) {
            const totalPizzas = Math.ceil(fatias / 6);
            const maxPorTela = window.innerWidth <= 575.98 ? 2 : (window.innerWidth <= 767.98 ? 2 : (window.innerWidth <= 991.98 ? 3 : 4));
            let html = '';

            // Mostrar ellipsis se houver mais pizzas que o limite
            if (totalPizzas > maxPorTela) {
                html += '<div class="pizza-ellipsis">...</div>';
            }

            // Mostrar apenas as últimas pizzas até o limite
            const startIndex = Math.max(0, totalPizzas - maxPorTela);
            for (let p = startIndex; p < totalPizzas; p++) {
                const fimFatia = Math.min(p * 6 + 6, fatias);
                const fatiasNaPizza = fimFatia - p * 6;

                // Pizza opaca se estiver completa
                html += `<div class="pizza-container" style="opacity: ${fatiasNaPizza === 6 ? '0.3' : '1'};">`;
                for (let i = 1; i <= 6; i++) {
                    const mostrar = i <= fatiasNaPizza;
                    html += `<img src="img/fatia-pizza2.png" class="fatia-pizza fatia-${i}" style="display: ${mostrar ? 'inline-block' : 'none'};">`;
                }
                html += '</div>';
            }

            return html;
        }

        // Função para atualizar a lista de participantes na tela
        function atualizarListaParticipantes() {
            const lista = document.getElementById('lista-participantes');

            if (participantes.length === 0) {
                lista.innerHTML = '<p class="sem-participantes">Nenhum participante ainda. Adicione alguém!</p>';
                return;
            }

            lista.innerHTML = participantes.map(participante => `
                <div class="participante-card" data-id="${participante.id}">
                    <div class="participante-header">
                        <h3>${participante.nome}</h3>
                        <button type="button" class="btn-remover-pessoa" onclick="removerParticipante(${participante.id})">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="participante-conteudo">
                        <div class="pizzas-wrapper">
                            ${gerarPizzas(participante.fatias)}
                        </div>
                        <div class="contador-e-botoes">
                            <div class="contador-pizza"><span>${participante.fatias}</span></div>
                            <div class="botoes-participante">
                                <button type="button" class="btn-fatia" onclick="adicionarFatia(${participante.id})">
                                    <i class="fas fa-plus"></i>
                                </button>
                                <button type="button" class="btn-fatia" onclick="removerFatia(${participante.id})">
                                    <i class="fas fa-minus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Permite adicionar participante com Enter
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('input-nome').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    adicionarParticipante();
                }
            });
        });
    </script>
</body>
</html>
